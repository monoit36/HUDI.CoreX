name: ABP Local Deploy Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'aspnet-core/**' # CHỈ KÍCH HOẠT KHI THAY ĐỔI CODE BACKEND
      - 'docker-compose.yml'

jobs:
  deploy-to-local-machine:
    # Điểm mấu chốt: Chỉ định job này chạy trên chính máy tính của bạn
    runs-on: self-hosted 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Vì chạy trực tiếp trên máy bạn, ta chỉ cần gọi thẳng lệnh docker-compose
      - name: Build and Run Docker Containers
        run: |
          # Lệnh này sẽ tự động build image từ code mới nhất và khởi động/cập nhật container
          docker-compose up -d --build
          
      - name: Dọn dẹp Image cũ (Tùy chọn)
        run: docker image prune -f