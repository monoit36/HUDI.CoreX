name: Deploy Backend Only

on:
  push:
    branches: [ "main" ]
    paths:
      - 'aspnet-core/**'
      - 'docker-compose.yml'

jobs:
  deploy-backend:
    runs-on: self-hosted 
    steps:
      # ==========================================
      # 1. NOTIFY DEPLOYMENT START
      # ==========================================
      - name: Telegram Notification (Start)
        run: |
          $Message = @"
          DEPLOYMENT STARTED...
          Pushed by: ${{ github.actor }}
          Branch: ${{ github.ref_name }}
          Commit message: ${{ github.event.head_commit.message }}
          "@
          
          # URL Encode message
          $EncodedMessage = [uri]::EscapeDataString($Message)
          $BotToken = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          $ChatId = "${{ secrets.TELEGRAM_CHAT_ID }}"
          
          if ([string]::IsNullOrWhiteSpace($BotToken) -or [string]::IsNullOrWhiteSpace($ChatId)) {
            Write-Host "LỖI: TELEGRAM_BOT_TOKEN hoặc TELEGRAM_CHAT_ID chưa được cấp trong GitHub Secrets!"
            exit 1
          }
          
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${BotToken}/sendMessage" -Method Post -Body @{
            chat_id = $ChatId
            text = $Message
          }

      # ==========================================
      # 2. MAIN EXECUTION STEPS
      # ==========================================
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Build and run via Docker Compose
        run: docker-compose up -d --build
        
      - name: Prune dangling images
        run: docker image prune -f

      # ==========================================
      # 3. NOTIFY DEPLOYMENT END
      # ==========================================
      - name: Telegram Notification (End)
        if: always() # CRITICAL: Ensure notification is sent even if the Build step fails
        run: |
          if ('${{ job.status }}' -eq 'success') {
            $StatusText = 'SUCCESS'
          } else {
            $StatusText = 'FAILED'
          }
          
          $RunUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $Message = @"
          Backend Deployment Status: $StatusText
          Repository: ${{ github.repository }}
          Action Log: $RunUrl
          "@
          
          $BotToken = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          $ChatId = '${{ secrets.TELEGRAM_CHAT_ID }}'
          
          if ([string]::IsNullOrWhiteSpace($BotToken) -or [string]::IsNullOrWhiteSpace($ChatId)) {
            Write-Host "LỖI: TELEGRAM_BOT_TOKEN hoặc TELEGRAM_CHAT_ID chưa được cấp trong GitHub Secrets!"
            exit 1
          }
          
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${BotToken}/sendMessage" -Method Post -Body @{
            chat_id = $ChatId
            text = $Message
          }