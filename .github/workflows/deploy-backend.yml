name: Deploy Backend Only

on:
  push:
    branches: [ "main" ]
    paths:
      - 'aspnet-core/**'
      - 'docker-compose.yml'

jobs:
  deploy-backend:
    runs-on: self-hosted 
    steps:
      # ==========================================
      # 1. THÔNG BÁO BẮT ĐẦU DEPLOY
      # ==========================================
      - name: 🚀 Thông báo Telegram (Bắt đầu)
        run: |
          $Message = @"
          ⏳ TIẾN TRÌNH DEPLOY BACKEND BẮT ĐẦU...
          👤 Người push code: ${{ github.actor }}
          🌿 Nhánh: ${{ github.ref_name }}
          📝 Nội dung commit: ${{ github.event.head_commit.message }}
          "@
          
          # URL Encode message
          $EncodedMessage = [uri]::EscapeDataString($Message)
          $BotToken = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          $ChatId = "${{ secrets.TELEGRAM_CHAT_ID }}"
          
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$BotToken/sendMessage" -Method Post -Body @{
            chat_id = $ChatId
            text = $Message
          }

      # ==========================================
      # 2. CÁC BƯỚC THỰC THI CHÍNH
      # ==========================================
      - name: Kéo code mới nhất từ GitHub
        uses: actions/checkout@v4

      - name: Build và chạy ứng dụng bằng Docker Compose
        run: docker-compose up -d --build
        
      - name: Dọn dẹp Image rác
        run: docker image prune -f

      # ==========================================
      # 3. THÔNG BÁO KẾT THÚC DEPLOY
      # ==========================================
      - name: 🏁 Thông báo Telegram (Kết thúc)
        if: always() # Dòng này CỰC KỲ QUAN TRỌNG: Đảm bảo luôn gửi tin nhắn dù bước Build ở trên có bị lỗi hay thành công
        run: |
          $StatusText = if ("${{ job.status }}" -eq "success") { "✅ THÀNH CÔNG" } else { "❌ THẤT BẠI" }
          $Message = @"
          Trạng thái Deploy Backend: $StatusText
          🖥️ Repository: ${{ github.repository }}
          🔗 Xem chi tiết log tại tab Actions trên GitHub.
          "@
          
          $BotToken = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          $ChatId = "${{ secrets.TELEGRAM_CHAT_ID }}"
          
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$BotToken/sendMessage" -Method Post -Body @{
            chat_id = $ChatId
            text = $Message
          }