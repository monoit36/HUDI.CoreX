server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Thư mục chứa code Angular sau khi build (dist)
    root /usr/share/nginx/html;
    index index.html;

    # Tối ưu hóa truyền tải dữ liệu
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Bảo mật: Ẩn phiên bản Nginx

    # Gzip Compression - Cực kỳ quan trọng với Angular
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        application/json 
        application/javascript 
        application/xml 
        application/xml+rss 
        text/javascript 
        image/svg+xml;

    # Hỗ trợ Angular Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Control cho Static Assets (JS, CSS, Images)
    # Angular dùng hash trong tên file (ví dụ: main.abc123.js) nên cache thoải mái
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Không cache index.html để đảm bảo người dùng luôn nhận bản cập nhật mới nhất
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Logs
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # Bảo mật: Chặn truy cập các file nhạy cảm
    location ~ /\.(?!well-known).* {
        deny all;
    }
}