<div [@routerTransition]>
  <div class="grid">
    <div class="col-12">
      <div class="card px-5 py-5">

        <!-- Header: Title + Create button -->
        <div class="flex flex-column sm:flex-row justify-content-between align-items-start sm:align-items-center mb-4 gap-3">
          <div>
            <h4 class="m-0 text-900 font-bold mb-1">{{ "Roles" | localize }}</h4>
            <span class="text-500 text-sm block">{{ "TotalRecordsCount" | localize: totalItems }}</span>
          </div>
          <div class="flex flex-column sm:flex-row align-items-center gap-3 w-full sm:w-auto">
            <span class="inline-flex align-items-center gap-2 px-3 py-2 border-round-3xl border-1 surface-border bg-white w-full sm:w-auto justify-content-center">
              <span class="w-1rem h-1rem border-circle bg-blue-500"></span>
              <span class="font-medium text-700 text-sm">{{ totalItems }} Total Roles</span>
            </span>
            <button pButton pRipple icon="pi pi-plus" [label]="'CreateNewRole' | localize" class="p-button-success w-full sm:w-auto"
              (click)="createRole()"></button>
          </div>
        </div>

        <!-- Control bar: Search + Refresh + Pagination -->
        <div class="flex flex-column sm:flex-row align-items-center justify-content-between mb-4 pb-4 border-bottom-1 surface-border gap-3">
          <div class="w-full sm:w-auto">
            <span class="p-input-icon-left w-full">
              <i class="pi pi-search"></i>
              <input pInputText type="text" [(ngModel)]="keyword" (keyup.enter)="getDataPage(1)"
                [placeholder]="'Search' | localize" class="w-full sm:w-16rem" />
            </span>
          </div>
          <div class="flex align-items-center gap-2 w-full sm:w-auto overflow-x-auto pb-2 sm:pb-0">
            <p-button icon="pi pi-refresh" [outlined]="true" severity="secondary" (onClick)="refresh()"
              pTooltip="Refresh" tooltipPosition="bottom"></p-button>
            
            <span class="text-700 text-sm white-space-nowrap border-1 surface-border border-round px-3 py-2 font-medium flex align-items-center justify-content-center" style="height: 40px;">
              {{ pageNumber }} of {{ totalPages }}
            </span>
            
            <p-button icon="pi pi-chevron-left" [outlined]="true" severity="secondary" [disabled]="pageNumber <= 1"
              (onClick)="getDataPage(pageNumber - 1)"></p-button>
            <p-button icon="pi pi-chevron-right" [outlined]="true" severity="secondary"
              [disabled]="pageNumber >= totalPages" (onClick)="getDataPage(pageNumber + 1)"></p-button>
          </div>
        </div>

        <!-- Table -->
        <p-table [value]="roles | paginate: {
            id: 'server',
            itemsPerPage: pageSize,
            currentPage: pageNumber,
            totalItems: totalItems
          }" responsiveLayout="scroll" [rows]="pageSize" [rowHover]="true" dataKey="id" [loading]="isTableLoading"
          styleClass="p-datatable-sm">
          <ng-template pTemplate="header">
            <tr>
              <th style="width: 3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
              </th>
              <th pSortableColumn="name">{{ "RoleName" | localize }} <p-sortIcon field="name"></p-sortIcon></th>
              <th pSortableColumn="displayName">{{ "DisplayName" | localize }} <p-sortIcon
                  field="displayName"></p-sortIcon></th>
              <th style="width: 4rem"></th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-role>
            <tr>
              <td>
                <p-tableCheckbox [value]="role"></p-tableCheckbox>
              </td>
              <td>
                <div class="flex align-items-center gap-2">
                  <div class="row-avatar" [style.background-color]="getAvatarColor(role.name)">
                    {{ getInitials(role.name) }}
                  </div>
                  <span class="font-medium text-900">{{ role.name }}</span>
                </div>
              </td>
              <td>{{ role.displayName }}</td>
              <td class="text-center">
                <p-button icon="pi pi-ellipsis-h" [text]="true" severity="secondary"
                  (onClick)="toggleActionMenu($event, role)"></p-button>
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="4" class="text-center p-5">
                <i class="pi pi-shield text-400" style="font-size: 2rem;"></i>
                <p class="mt-2 text-500">{{ "NoData" | localize }}</p>
              </td>
            </tr>
          </ng-template>
        </p-table>

      </div>
    </div>
  </div>

  <p-menu #actionMenu [model]="actionMenuItems" [popup]="true" appendTo="body"></p-menu>

  <app-create-role-dialog #createRoleDialog (onSave)="refresh()"></app-create-role-dialog>
  <app-edit-role-dialog #editRoleDialog (onSave)="refresh()"></app-edit-role-dialog>
</div>
