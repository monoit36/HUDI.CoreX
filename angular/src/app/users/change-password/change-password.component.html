<div [@routerTransition]>
  <div class="grid">
    <div class="col-12 md:col-8 md:col-offset-2 lg:col-6 lg:col-offset-3">
      <div class="card px-6 py-6">
        <div class="mb-4">
          <h5 class="m-0 text-900 font-semibold">
            <i class="pi pi-lock mr-2 text-primary"></i>
            {{ "UpdatePassword" | localize }}
          </h5>
          <span class="text-500 text-sm mt-1 block">{{ "ChangePasswordDescription" | localize }}</span>
        </div>
        <p-divider></p-divider>

        <form
          autocomplete="off"
          #changePasswordForm="ngForm"
          (ngSubmit)="changePassword()"
          class="p-fluid"
        >
          <!-- Current Password -->
          <div class="field">
            <label for="currentPassword" class="font-medium text-900">
              {{ "CurrentPassword" | localize }} <span class="text-red-500">*</span>
            </label>
            <p-password
              name="currentPassword"
              inputId="currentPassword"
              required
              minlength="2"
              maxlength="32"
              [(ngModel)]="changePasswordDto.currentPassword"
              #currentPasswordModel="ngModel"
              #currentPasswordEl
              [feedback]="false"
              [toggleMask]="true"
              styleClass="w-full"
              [inputStyle]="{'width': '100%'}"
              [ngClass]="{'ng-invalid ng-dirty': currentPasswordModel.invalid && (currentPasswordModel.dirty || currentPasswordModel.touched)}"
            ></p-password>
            <abp-validation-summary
              [control]="currentPasswordModel"
              [controlEl]="currentPasswordEl"
            ></abp-validation-summary>
          </div>

          <p-divider></p-divider>

          <!-- New Password -->
          <div class="field">
            <label for="newPassword" class="font-medium text-900">
              {{ "NewPassword" | localize }} <span class="text-red-500">*</span>
            </label>
            <p-password
              name="newPassword"
              inputId="newPassword"
              required
              minlength="2"
              maxlength="32"
              validateEqual="confirmNewPassword"
              reverse="true"
              pattern="(?=^.{8,}$)(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?!\s)[0-9a-zA-Z!@#$%^&*()]*$"
              [(ngModel)]="changePasswordDto.newPassword"
              #newPasswordModel="ngModel"
              #newPasswordEl
              [toggleMask]="true"
              styleClass="w-full"
              [inputStyle]="{'width': '100%'}"
              [ngClass]="{'ng-invalid ng-dirty': newPasswordModel.invalid && (newPasswordModel.dirty || newPasswordModel.touched)}"
            ></p-password>
            <abp-validation-summary
              [control]="newPasswordModel"
              [controlEl]="newPasswordEl"
              [customValidationErrors]="newPasswordValidationErrors"
            ></abp-validation-summary>
          </div>

          <!-- Confirm New Password -->
          <div class="field">
            <label for="confirmNewPassword" class="font-medium text-900">
              {{ "ConfirmNewPassword" | localize }} <span class="text-red-500">*</span>
            </label>
            <p-password
              name="confirmNewPassword"
              inputId="confirmNewPassword"
              required
              minlength="2"
              maxlength="32"
              validateEqual="newPassword"
              reverse="false"
              ngModel
              #confirmNewPasswordModel="ngModel"
              #confirmNewPasswordEl
              [feedback]="false"
              [toggleMask]="true"
              styleClass="w-full"
              [inputStyle]="{'width': '100%'}"
              [ngClass]="{'ng-invalid ng-dirty': confirmNewPasswordModel.invalid && (confirmNewPasswordModel.dirty || confirmNewPasswordModel.touched)}"
            ></p-password>
            <abp-validation-summary
              [control]="confirmNewPasswordModel"
              [controlEl]="confirmNewPasswordEl"
              [customValidationErrors]="confirmNewPasswordValidationErrors"
            ></abp-validation-summary>
          </div>

          <div class="flex justify-content-end gap-2 mt-4">
            <p-button
              type="submit"
              [label]="'Save' | localize"
              icon="pi pi-check"
              [disabled]="!changePasswordForm.form.valid || saving"
              [loading]="saving"
            ></p-button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
