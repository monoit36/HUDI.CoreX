<p-dialog [(visible)]="visible" [style]="{width: '600px', 'max-height': '90vh'}" [header]="'CreateNewTenant' | localize" [modal]="true" (onHide)="hide()">
  <ng-template pTemplate="content">
    <form autocomplete="off" #createTenantModal="ngForm" id="createTenantForm" class="p-fluid">

      <!-- Tenancy Name -->
      <div class="field mt-3">
        <label for="tenancyName" class="font-medium text-900">{{ "TenancyName" | localize }} <span class="text-red-500">*</span></label>
        <input
          pInputText
          type="text"
          name="tenancyName"
          id="tenancyName"
          minlength="2"
          maxlength="64"
          required
          [(ngModel)]="tenant.tenancyName"
          #tenancyNameModel="ngModel"
          #tenancyNameEl
          class="w-full"
          [ngClass]="{'ng-invalid ng-dirty': tenancyNameModel.invalid && (tenancyNameModel.dirty || tenancyNameModel.touched)}"
        />
        <abp-validation-summary [control]="tenancyNameModel" [controlEl]="tenancyNameEl"></abp-validation-summary>
      </div>

      <!-- Name -->
      <div class="field">
        <label for="name" class="font-medium text-900">{{ "Name" | localize }} <span class="text-red-500">*</span></label>
        <input
          pInputText
          type="text"
          name="name"
          id="name"
          maxlength="128"
          required
          [(ngModel)]="tenant.name"
          #nameModel="ngModel"
          #nameEl
          class="w-full"
          [ngClass]="{'ng-invalid ng-dirty': nameModel.invalid && (nameModel.dirty || nameModel.touched)}"
        />
        <abp-validation-summary [control]="nameModel" [controlEl]="nameEl"></abp-validation-summary>
      </div>

      <!-- Connection String -->
      <div class="field">
        <label for="connectionString" class="font-medium text-900">{{ "DatabaseConnectionString" | localize }}</label>
        <input
          pInputText
          type="text"
          name="connectionString"
          id="connectionString"
          maxlength="1024"
          [(ngModel)]="tenant.connectionString"
          class="w-full"
        />
      </div>

      <!-- Admin Email -->
      <div class="field">
        <label for="adminEmailAddress" class="font-medium text-900">{{ "AdminEmailAddress" | localize }} <span class="text-red-500">*</span></label>
        <input
          pInputText
          type="email"
          name="adminEmailAddress"
          id="adminEmailAddress"
          pattern="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{1,})+$"
          maxlength="256"
          required
          [(ngModel)]="tenant.adminEmailAddress"
          #adminEmailAddressModel="ngModel"
          #adminEmailAddressEl
          class="w-full"
          [ngClass]="{'ng-invalid ng-dirty': adminEmailAddressModel.invalid && (adminEmailAddressModel.dirty || adminEmailAddressModel.touched)}"
        />
        <abp-validation-summary [control]="adminEmailAddressModel" [controlEl]="adminEmailAddressEl"></abp-validation-summary>
      </div>

      <!-- Is Active -->
      <div class="field-checkbox mt-2">
        <p-checkbox
          name="isActive"
          [(ngModel)]="tenant.isActive"
          [binary]="true"
          inputId="isActive"
        ></p-checkbox>
        <label for="isActive">{{ "IsActive" | localize }}</label>
      </div>

      <p class="text-center text-primary text-sm mb-0 mt-2">
        {{ "DefaultPasswordIs" | localize: "123qwe" }}
      </p>
    </form>
  </ng-template>
  <ng-template pTemplate="footer">
    <button pButton pRipple [label]="'Cancel' | localize" icon="pi pi-times" class="p-button-text p-button-secondary" (click)="hide()" [disabled]="saving"></button>
    <button pButton pRipple [label]="'Save' | localize" icon="pi pi-check" (click)="save()" [disabled]="createTenantModal && !createTenantModal.valid || saving" [loading]="saving"></button>
  </ng-template>
</p-dialog>
