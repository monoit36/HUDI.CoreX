<p-dialog [(visible)]="visible" [style]="{width: '650px', 'max-height': '90vh'}" [header]="'EditMasterData' | localize" [modal]="true" (onHide)="hide()">
  <ng-template pTemplate="content">
    <form autocomplete="off" #editMasterDataModal="ngForm" id="editMasterDataForm" class="p-fluid">

      <!-- Category Code + Code - 2 cols -->
      <div class="formgrid grid mt-3">
        <div class="field col-12 md:col-6">
          <label for="categoryCode" class="font-medium text-900">{{ "CategoryCode" | localize }} <span class="text-red-500">*</span></label>
          <input
            pInputText type="text" name="categoryCode" id="categoryCode"
            maxlength="50" required
            [(ngModel)]="item.categoryCode"
            #categoryCodeModel="ngModel" #categoryCodeEl
            [ngClass]="{'ng-invalid ng-dirty': categoryCodeModel.invalid && (categoryCodeModel.dirty || categoryCodeModel.touched)}"
          />
          <abp-validation-summary [control]="categoryCodeModel" [controlEl]="categoryCodeEl"></abp-validation-summary>
        </div>
        <div class="field col-12 md:col-6">
          <label for="code" class="font-medium text-900">{{ "Code" | localize }} <span class="text-red-500">*</span></label>
          <input
            pInputText type="text" name="code" id="code"
            maxlength="50" required
            [(ngModel)]="item.code"
            #codeModel="ngModel" #codeEl
            [ngClass]="{'ng-invalid ng-dirty': codeModel.invalid && (codeModel.dirty || codeModel.touched)}"
          />
          <abp-validation-summary [control]="codeModel" [controlEl]="codeEl"></abp-validation-summary>
        </div>
      </div>

      <!-- Value + Display Value - 2 cols -->
      <div class="formgrid grid">
        <div class="field col-12 md:col-6">
          <label for="value" class="font-medium text-900">{{ "Value" | localize }} <span class="text-red-500">*</span></label>
          <input
            pInputText type="text" name="value" id="value"
            maxlength="255" required
            [(ngModel)]="item.value"
            #valueModel="ngModel" #valueEl
            [ngClass]="{'ng-invalid ng-dirty': valueModel.invalid && (valueModel.dirty || valueModel.touched)}"
          />
          <abp-validation-summary [control]="valueModel" [controlEl]="valueEl"></abp-validation-summary>
        </div>
        <div class="field col-12 md:col-6">
          <label for="displayValue" class="font-medium text-900">{{ "DisplayValue" | localize }}</label>
          <input
            pInputText type="text" name="displayValue" id="displayValue"
            maxlength="500"
            [(ngModel)]="item.displayValue"
          />
        </div>
      </div>

      <!-- Sort Order -->
      <div class="field">
        <label for="sortOrder" class="font-medium text-900">{{ "SortOrder" | localize }}</label>
        <input pInputText type="number" name="sortOrder" id="sortOrder" [(ngModel)]="item.sortOrder" />
      </div>

      <!-- Description -->
      <div class="field">
        <label for="description" class="font-medium text-900">{{ "Description" | localize }}</label>
        <textarea pInputTextarea name="description" id="description" [rows]="3" [(ngModel)]="item.description" class="w-full"></textarea>
      </div>

      <!-- Is Active -->
      <div class="field-checkbox mt-2">
        <p-checkbox name="isActive" [(ngModel)]="item.isActive" [binary]="true" inputId="isActive"></p-checkbox>
        <label for="isActive">{{ "IsActive" | localize }}</label>
      </div>

    </form>
  </ng-template>
  <ng-template pTemplate="footer">
    <button pButton pRipple [label]="'Cancel' | localize" icon="pi pi-times" class="p-button-text p-button-secondary" (click)="hide()" [disabled]="saving"></button>
    <button pButton pRipple [label]="'Save' | localize" icon="pi pi-check" (click)="save()" [disabled]="editMasterDataModal && !editMasterDataModal.valid || saving" [loading]="saving"></button>
  </ng-template>
</p-dialog>
