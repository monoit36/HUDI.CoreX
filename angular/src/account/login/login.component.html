<div class="flex flex-column align-items-center justify-content-center w-full" [@routerTransition]>
  <!-- Logo -->
  <div class="mb-5 flex-shrink-0 text-center">
    <h1 class="text-primary font-bold text-5xl m-0">HUDI.<span class="text-900">CoreX</span></h1>
  </div>

  <!-- Login Card container with gradient border effect -->
  <div style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%);">
    <div class="w-full surface-card py-7 px-5 sm:px-8 flex flex-column align-items-center" style="border-radius:53px; min-width: 400px; max-width: 500px;">
      
      <div class="text-center mb-5 w-full">
        <div class="text-900 text-3xl font-medium mb-3">{{ "LogIn" | localize }}</div>
        <span class="text-600 font-medium">Sign in to continue</span>
      </div>

      <form novalidate autocomplete="off" #loginForm="ngForm" (ngSubmit)="login()" class="w-full">
        <!-- Username or Email -->
        <div class="mb-4 w-full">
          <label for="userNameOrEmailAddress" class="block text-900 text-lg font-medium mb-2">{{ "UserNameOrEmail" | localize }}</label>
          <input
            id="userNameOrEmailAddress"
            type="text"
            pInputText
            class="w-full p-3"
            name="userNameOrEmailAddress"
            [(ngModel)]="authService.authenticateModel.userNameOrEmailAddress"
            [placeholder]="'UserNameOrEmail' | localize"
            required
            maxlength="256"
            #userNameOrEmailAddressModel="ngModel"
            #userNameOrEmailAddressEl
            [ngClass]="{'ng-invalid ng-dirty': userNameOrEmailAddressModel.invalid && (userNameOrEmailAddressModel.dirty || userNameOrEmailAddressModel.touched)}"
          />
          <abp-validation-summary [control]="userNameOrEmailAddressModel" [controlEl]="userNameOrEmailAddressEl"></abp-validation-summary>
        </div>

        <!-- Password -->
        <div class="mb-4 w-full">
          <label for="password" class="block text-900 font-medium text-lg mb-2">{{ "Password" | localize }}</label>
          <p-password
            id="password"
            name="password"
            [(ngModel)]="authService.authenticateModel.password"
            [placeholder]="'Password' | localize"
            required
            maxlength="32"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full p-3"
            #passwordModel="ngModel"
            #passwordEl
          ></p-password>
          <abp-validation-summary [control]="passwordModel" [controlEl]="passwordEl"></abp-validation-summary>
        </div>

        <!-- Options: Remember Me -->
        <div class="flex align-items-center mb-5 w-full">
          <p-checkbox
            id="rememberMe"
            name="rememberMe"
            [(ngModel)]="authService.rememberMe"
            [binary]="true"
            styleClass="mr-2"
          ></p-checkbox>
          <label for="rememberMe" class="text-700">{{ "RememberMe" | localize }}</label>
        </div>

        <!-- Submit Button -->
        <button
          pButton
          pRipple
          type="submit"
          [label]="'LogIn' | localize"
          class="w-full p-3 text-xl font-bold"
          [disabled]="!loginForm.form.valid || submitting"
          [loading]="submitting"
        ></button>
      </form>

      <!-- Register Link -->
      @if (isSelfRegistrationAllowed) {
        <div class="mt-4 text-center w-full">
          <p class="mb-1 text-600">
            Don't have an account?
            <a [routerLink]="['../register']" class="font-medium no-underline ml-1 cursor-pointer text-primary">
              {{ "Register" | localize }}
            </a>
          </p>
        </div>
      }
    </div>
  </div>
</div>
